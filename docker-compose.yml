version: '3.9'

# VSL — Virtual Simulation Lab
# Pop!_OS 24.04 · RTX 4060 · CUDA 13.0 (driver) / 12.0 (nvcc)
#
# Containers:
#   julia-solver   — desenvolvimento e testes do solver Julia
#   pluto          — notebooks de validação (→ paper)
#   vsl-build      — compila processo principal C++ + LibGodot
#   latex-paper    — compila o paper LaTeX
#
# Uso rápido:
#   docker compose run --rm julia-solver   → REPL Julia
#   docker compose up pluto                → localhost:1234
#   docker compose run --rm vsl-build      → compila tudo
#   docker compose run --rm latex-paper    → gera PDF

services:

  # ─── Solver Julia ────────────────────────────────────────────────
  julia-solver:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_solver
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto          # usa todos os 28 cores
      - JULIA_CUDA_SOFT_MEMORY_LIMIT=6GiB  # deixa 2GB para Godot/OS
      - JULIA_DEPOT_PATH=/root/.julia
    volumes:
      - ./solver:/workspace/solver      # hot reload do código
      - ./paper/figures:/workspace/paper/figures  # figuras → paper
      - julia-depot:/root/.julia        # cache de pacotes persistente
    working_dir: /workspace/solver
    command: julia --project=. --threads=auto
    stdin_open: true
    tty: true

  # ─── Pluto notebooks (validação → paper) ─────────────────────────
  pluto:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_pluto
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto
    ports:
      - "1234:1234"
    volumes:
      - ./solver:/workspace/solver
      - ./paper/figures:/workspace/paper/figures
      - julia-depot:/root/.julia
    working_dir: /workspace/solver
    command: >
      julia --project=. -e
      "using Pluto; Pluto.run(host=\"0.0.0.0\", port=1234, launch_browser=false)"

  # ─── Build processo principal C++ + LibGodot ─────────────────────
  vsl-build:
    build:
      context: .
      dockerfile: Dockerfile.build
    image: vsl-build:latest
    container_name: vsl_build
    environment:
      - CMAKE_BUILD_PARALLEL_LEVEL=28   # usa todos os cores no build
    volumes:
      - ./main:/workspace/main          # processo principal C++
      - ./godot:/workspace/godot        # cenas e assets
      - ./solver:/workspace/solver      # acesso ao libjulia compilado
      - build-cache:/workspace/.cache   # cache de compilação
    working_dir: /workspace
    # Build completo: LibGodot + processo principal
    command: >
      bash -c "
        echo '=== Compilando processo principal VSL ===' &&
        cd /workspace/main &&
        cmake -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -GNinja
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON &&
        cmake --build build -j${CMAKE_BUILD_PARALLEL_LEVEL:-$(nproc)} &&
        echo '=== Build concluído ==='
      "

  # ─── LaTeX paper ─────────────────────────────────────────────────
  latex-paper:
    build:
      context: ./paper
      dockerfile: Dockerfile
    image: vsl-latex:latest
    container_name: vsl_latex
    volumes:
      - ./paper:/workspace/paper
    working_dir: /workspace/paper
    # Watch mode — recompila ao salvar qualquer .tex
    command: >
      latexmk -pdf -pvc
      -interaction=nonstopmode
      -outdir=build
      main.tex

  # ─── Compilar sysimage Julia (PackageCompiler) ───────────────────
  # Uso: docker compose run --rm julia-compile
  # Gera solver/libjulia_vsl.so para embed no processo principal C++
  julia-compile:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_julia_compile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto
    volumes:
      - ./solver:/workspace/solver
      - julia-depot:/root/.julia
    working_dir: /workspace/solver
    # Compila o solver como biblioteca compartilhada
    command: >
      julia --project=. -e "
        using PackageCompiler
        create_library(
          \".\",
          \"build/libjulia_vsl\";
          lib_name = \"julia_vsl\",
          precompile_execution_file = \"test/precompile_hints.jl\",
          incremental = false,
          filter_stdlibs = true,
        )
        println(\"✓ libjulia_vsl compilada em solver/build/\")
      "

volumes:
  julia-depot:
    name: vsl_julia_depot   # cache persistente de pacotes Julia
  build-cache:
    name: vsl_build_cache   # cache de compilação C++
