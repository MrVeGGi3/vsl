# ─── VSL — Virtual Simulation Lab ─────────────────────────────────
# Pop!_OS 24.04 · RTX 4060 · CUDA 13.0 (driver) / 12.0 (nvcc)

services:

  # ─── Solver Julia ────────────────────────────────────────────────
  julia-solver:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_solver
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto
      - JULIA_CUDA_SOFT_MEMORY_LIMIT=6GiB
      - JULIA_DEPOT_PATH=/root/.julia
    volumes:
      - ./solver:/workspace/solver
      - ./paper/figures:/workspace/paper/figures
      - julia-depot:/root/.julia
    working_dir: /workspace/solver
    command: julia --project=. --threads=auto
    stdin_open: true
    tty: true

  # ─── Pluto notebooks (validação → paper) ─────────────────────────
  pluto:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_pluto
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto
    ports:
      - "1234:1234"
    volumes:
      - ./solver:/workspace/solver
      - ./paper/figures:/workspace/paper/figures
      - julia-depot:/root/.julia
    working_dir: /workspace/solver
    command: >
      julia --project=. -e
      "using Pluto; Pluto.run(host=\"0.0.0.0\", port=1234, launch_browser=false)"

  # ─── Build processo principal C++ + LibGodot ─────────────────────
  vsl-build:
    build:
      context: .
      dockerfile: Dockerfile.build
    image: vsl-build:latest
    container_name: vsl_build
    environment:
      - CMAKE_BUILD_PARALLEL_LEVEL=28
    volumes:
      - ./main:/workspace/main
      - ./godot:/workspace/godot
      - ./solver:/workspace/solver
      - build-cache:/workspace/.cache
    working_dir: /workspace
    # CORREÇÃO: Adicionado barras invertidas (\) para que o bash entenda a continuação do comando
    command: >
      bash -c "
        echo '=== Compilando processo principal VSL ===' &&
        cd /workspace/main &&
        cmake -B build \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -GNinja \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON &&
        cmake --build build -j${CMAKE_BUILD_PARALLEL_LEVEL:-$(nproc)} &&
        echo '=== Build concluído ==='
      "

  # ─── LaTeX paper ─────────────────────────────────────────────────
  latex-paper:
    build:
      context: ./paper
      dockerfile: Dockerfile
    image: vsl-latex:latest
    container_name: vsl_latex
    volumes:
      - ./paper:/workspace/paper
    working_dir: /workspace/paper
    command: >
      latexmk -pdf -pvc
      -interaction=nonstopmode
      -outdir=build
      main.tex

  # ─── Compilar sysimage Julia (PackageCompiler) ───────────────────
  julia-compile:
    build:
      context: ./solver
      dockerfile: Dockerfile
    image: vsl-julia-solver:latest
    container_name: vsl_julia_compile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JULIA_NUM_THREADS=auto
    volumes:
      - ./solver:/workspace/solver
      - julia-depot:/root/.julia
    working_dir: /workspace/solver
    command: >
      julia --project=. -e "
        using PackageCompiler;
        create_library(
          \".\",
          \"build/libjulia_vsl\";
          lib_name = \"julia_vsl\",
          precompile_execution_file = \"test/precompile_hints.jl\",
          incremental = false,
          filter_stdlibs = true,
        );
        println(\"✓ libjulia_vsl compilada em solver/build/\");
      "

volumes:
  julia-depot:
    name: vsl_julia_depot
  build-cache:
    name: vsl_build_cache