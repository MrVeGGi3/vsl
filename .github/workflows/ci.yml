name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Julia solver tests ────────────────────────────────────────────
  solver-tests:
    name: Solver Tests (Julia ${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2
        with:
          cache-name: vsl-solver-${{ matrix.julia-version }}

      - name: Instantiate solver dependencies
        working-directory: solver
        run: julia --project=. -e "using Pkg; Pkg.instantiate()"

      - name: Run solver test suite
        working-directory: solver
        run: julia --project=. -e "using Pkg; Pkg.test()"

  # ── JOSS paper draft ──────────────────────────────────────────────
  paper-draft:
    name: JOSS Paper Draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - uses: actions/upload-artifact@v4
        with:
          name: paper-draft
          path: paper/paper.pdf
